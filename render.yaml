services:
  - type: web
    name: pos-system-for-bakery
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: BAKERY_POS_DB
        value: /data/bakery_pos.db
      - key: BAKERY_POS_BACKUP_DIR
        value: /data/backups
    disk:
      name: bakery-pos-data
      mountPath: /data
      sizeGB: 1
